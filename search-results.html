<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDPS - Flight Search Results</title>
    <link rel="stylesheet" href="search-results.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar">
        <div class="logo">ARDPS</div>
        <div class="search-summary">
            <div class="route">
                <span>MAA</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14m-4-4l4 4-4 4" />
                </svg>
                <span>DEL</span>
            </div>
            <div class="details">
                <span>20 Mar 2026</span> • <span>1 Passenger</span> • <span>Economy</span>
            </div>
        </div>
        <button class="edit-search-btn">Edit Search</button>
    </header>

    <main class="results-container">
        <!-- Sidebar Filters -->
        <aside class="filters-sidebar">
            <div class="filter-header">
                <h3>Filters</h3>
                <button class="reset-btn">Reset</button>
            </div>

            <div class="filter-group">
                <h4>Price Range</h4>
                <div class="price-slider-container">
                    <input type="range" min="8000" max="45000" value="45000" class="price-slider" id="priceRange">
                    <div class="price-labels">
                        <span>₹8K</span>
                        <span id="priceValue">₹45K</span>
                    </div>
                </div>
            </div>

            <div class="filter-group">
                <h4>Cabin Class</h4>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" checked>
                        <span>Economy</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <span>Business</span>
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h4>Departure Time</h4>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <span>Morning (06:00 - 12:00)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <span>Afternoon (12:00 - 18:00)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <span>Evening (18:00 - 00:00)</span>
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h4>Stops</h4>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="stops" checked>
                        <span>Any number of stops</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="stops">
                        <span>Non-stop only</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="stops">
                        <span>1 stop or fewer</span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- Main Content area (Sort & Results) -->
        <div class="main-content">
            <div class="sort-bar">
                <span class="results-count">Showing 3 flights</span>
                <div class="sort-options">
                    <span>Sort by:</span>
                    <select class="sort-select">
                        <option>Recommended</option>
                        <option>Price (Low to High)</option>
                        <option>Duration (Shortest)</option>
                        <option>Departure (Earliest)</option>
                    </select>
                </div>
            </div>

            <div class="flight-list" id="flightList">
                <div class="flight-card" style="text-align: center; font-weight: 500;">
                    Loading flights from ARDPS Database...
                </div>
            </div>
        </div>
    </main>

    <script src="search-results.js"></script>
</body>

</html>
