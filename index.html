<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDPS - Fly Smarter. Book Faster. Price Dynamically.</title>
    <meta name="description" content="Airline Reservation & Dynamic Pricing System - Fly smarter with our state-of-the-art dynamic pricing platform.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated background layers -->
    <div class="sky-container">
        <div class="stars"></div>
        <div class="clouds"></div>
        <div class="flight-paths"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="plane-icon">
                <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 4-3 3-3-1-2 2 5 2 2 5 2-2-1-3 3-3 4 6z"></path>
            </svg>
            ARDPS
        </div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#flights">Flights</a></li>
            <li><a href="#bookings">Bookings</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#admin" class="admin-btn">Admin Dashboard</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <main class="hero" id="home">
        <div class="hero-content">
            <h1 class="glow-text">Fly Smarter. Book Faster.<br>Price <span class="accent-text">Dynamically.</span></h1>
            <p>Experience the next generation of airline reservations. Real-time dynamic pricing ensures you always get the optimal fare.</p>
            
            <div class="search-widget" id="flightSearchForm">
                <div class="input-group">
                    <label for="from-input">From</label>
                    <input type="text" id="from-input" placeholder="Origin City or Airport" required>
                </div>
                
                <div class="swap-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="14" x2="21" y2="3"></line>
                        <polyline points="8 21 3 21 3 16"></polyline>
                        <line x1="20" y1="10" x2="3" y2="21"></line>
                    </svg>
                </div>

                <div class="input-group">
                    <label for="to-input">To</label>
                    <input type="text" id="to-input" placeholder="Destination City or Airport" required>
                </div>
                <div class="input-group">
                    <label for="date-input">Date</label>
                    <input type="date" id="date-input" required>
                </div>
                <div class="input-group">
                    <label for="passengers-input">Passengers</label>
                    <input type="number" id="passengers-input" min="1" value="1" required>
                </div>
                <button type="submit" class="cta-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 8px;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Search Flights
                </button>
            </div>
            <div id="loadingIndicator" class="hidden">
                <div class="spinner"></div>
                <span>Calculating optimal dynamic prices...</span>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
